sonar.projectKey=bilaltawfic_khepri
sonar.organization=bilaltawfic

# Source directories
sonar.sources=apps,packages,supabase

# Exclude test files, dependencies, and config files from analysis
# These match the exclusions in jest.config.js collectCoverageFrom
sonar.exclusions=**/node_modules/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*.integration.test.ts,**/__tests__/integration/**,**/coverage/**,**/_layout.tsx,**/index.ts,**/useColorScheme.ts,**/jest.setup.ts,**/*.d.ts,supabase/migrations/**

# Test coverage - LCOV format (all packages in monorepo)
sonar.javascript.lcov.reportPaths=apps/mobile/coverage/lcov.info,packages/ai-client/coverage/lcov.info,packages/core/coverage/lcov.info,packages/supabase-client/coverage/lcov.info,supabase/coverage/lcov.info

# Exclude files from duplication analysis (CPD)
# - types.ts: Generated Database interface is inherently repetitive
# - CRUD hooks/queries: Goals and Constraints follow identical CRUD patterns by design.
#   These will be consolidated into shared abstractions in a future refactor.
# - helpers.ts: Supabase edge functions run in Deno and cannot import from the npm monorepo,
#   so adaptation logic is intentionally duplicated from packages/core/src/utils/adaptation-engine.ts.
sonar.cpd.exclusions=packages/supabase-client/src/types.ts,apps/mobile/hooks/useGoals.ts,apps/mobile/hooks/useConstraints.ts,packages/supabase-client/src/queries/goals.ts,packages/supabase-client/src/queries/constraints.ts,supabase/functions/suggest-adaptation/helpers.ts